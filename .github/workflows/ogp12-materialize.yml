name: OGP12 materialize assets

on:
  push:
    branches:
      - ogp-012-repository-cover
    paths:
      - .github/workflows/ogp12-materialize.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - .github/workflows/ogp12-materialize.yml

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ogp-012-repository-cover
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate and verify assets
        run: |
          python -m pip install --disable-pip-version-check Pillow==12.2.0
          python .github/ogp12_materialize.py
      - name: Commit generated repository assets
        run: |
          rm -rf .ogp12-assets
          rm -f .github/ogp12_materialize.py
          rm -f .github/workflows/ogp12-materialize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "🔗OGP#12 • 🎴Cover • materialize verified binary assets"
          git push origin HEAD:ogp-012-repository-cover

# One-shot workflow; removed by its own successful commit.
